<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Trattoria</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary:       #C8442A;
      --primary-light: #E8593E;
      --primary-dark:  #9E3320;
      --secondary:     #E8913A;
      --bg:            #FDF6ED;
      --card:          #FFFFFF;
      --text:          #2C1810;
      --muted:         #8B6355;
      --border:        #EAD9C8;
      --shadow:        0 2px 14px rgba(44,24,16,.09);
      --radius:        14px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ───────────────────────────── */
    .top-bar {
      background: var(--primary);
      color: #fff;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 10px rgba(0,0,0,.18);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .top-bar h1  { font-size: 19px; font-weight: 800; letter-spacing: .3px; }
    .top-bar .sub { font-size: 11px; opacity: .8; margin-top: 1px; }
    .top-bar .logo { font-size: 26px; }

    /* ── DASHBOARD ────────────────────────── */
    .dash-wrap {
      padding: 20px;
      max-width: 820px;
      margin: 0 auto;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 12px;
      margin-bottom: 22px;
    }
    .stat-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 14px 12px;
      text-align: center;
      box-shadow: var(--shadow);
    }
    .stat-val   { font-size: 20px; font-weight: 800; }
    .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; margin-top: 3px; }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 14px;
    }

    .tables-grid {
      display: grid;
      grid-template-columns: repeat(2,1fr);
      gap: 14px;
    }
    @media(min-width:580px){ .tables-grid { grid-template-columns: repeat(3,1fr); } }

    .t-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform .18s, box-shadow .18s, border-color .18s;
    }
    .t-card:hover       { transform: translateY(-2px); box-shadow: 0 6px 22px rgba(44,24,16,.13); }
    .t-card.is-active   { border-color: var(--primary); }

    .t-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }
    .t-num       { font-size: 17px; font-weight: 800; }
    .t-guests    { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .badge {
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: .5px;
      white-space: nowrap;
    }
    .badge-unpaid  { background: #FDECEA; color: #C8442A; }
    .badge-partial { background: #FFF4E6; color: #D07020; }
    .badge-paid    { background: #EAF5EB; color: #2E7D32; }

    .t-total {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .prog-bar {
      height: 4px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .prog-fill {
      height: 100%;
      border-radius: 4px;
      background: var(--secondary);
      transition: width .5s ease;
    }
    .prog-fill.full { background: #4CAF50; }

    .qr-btn {
      width: 100%;
      padding: 8px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all .18s;
    }
    .qr-btn:hover { background: var(--primary); border-color: var(--primary); color: #fff; }

    /* ── MODAL ────────────────────────────── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(44,24,16,.55);
      backdrop-filter: blur(5px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .overlay.hidden { display: none; }

    .modal {
      background: #fff;
      border-radius: var(--radius);
      padding: 28px 24px 24px;
      max-width: 320px;
      width: 100%;
      text-align: center;
      box-shadow: 0 24px 64px rgba(44,24,16,.28);
    }
    .modal-title    { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
    .modal-sub      { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
    #qr-box         { display: flex; justify-content: center; margin-bottom: 16px; }
    #qr-box canvas,
    #qr-box img     { border-radius: 8px; }
    .modal-url {
      font-size: 10px;
      font-family: monospace;
      background: var(--bg);
      color: var(--muted);
      padding: 8px 12px;
      border-radius: 8px;
      word-break: break-all;
      margin-bottom: 16px;
    }
    .modal-close-btn {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background .18s;
    }
    .modal-close-btn:hover { background: var(--primary-dark); }

    /* ── BILL VIEW ────────────────────────── */
    .bill-wrap {
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: 48px;
    }

    .bill-hero {
      background: linear-gradient(145deg, #C8442A 0%, #A03222 100%);
      color: #fff;
      padding: 20px 20px 44px;
      position: relative;
    }
    .bill-hero::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0; right: 0;
      height: 32px;
      background: var(--bg);
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,.18);
      border: none;
      color: #fff;
      padding: 7px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 16px;
      transition: background .18s;
    }
    .back-link:hover { background: rgba(255,255,255,.28); }
    .hero-name  { font-size: 26px; font-weight: 900; letter-spacing: -.5px; margin-bottom: 6px; }
    .hero-meta  { font-size: 13px; opacity: .85; display: flex; align-items: center; gap: 8px; }

    .bill-body { padding: 28px 16px 0; }

    .card-block {
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }

    .row-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 16px;
      border-bottom: 1px solid var(--border);
    }
    .row-item:last-child { border-bottom: none; }
    .row-item.clickable  { cursor: pointer; transition: background .14s; }
    .row-item.clickable:hover { background: var(--bg); }
    .row-item.picked     { background: #FFF1EC; }

    .check-circle {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid var(--border);
      margin-right: 12px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
      transition: all .15s;
    }
    .row-item.picked .check-circle {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
      font-weight: 900;
    }

    .item-name  { font-size: 14px; color: var(--text); }
    .item-qty-tag {
      font-size: 11px;
      color: var(--muted);
      background: var(--bg);
      border-radius: 4px;
      padding: 1px 5px;
      margin-left: 6px;
    }
    .item-price { font-size: 14px; font-weight: 700; color: var(--text); flex-shrink: 0; margin-left: 8px; }

    .summary-block {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }
    .sum-row {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 9px;
    }
    .sum-row:last-child { margin-bottom: 0; }
    .sum-row.total-row {
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
      padding-top: 10px;
      margin-top: 4px;
      border-top: 1.5px solid var(--border);
    }
    .tip-chip {
      font-size: 10px;
      background: var(--secondary);
      color: #fff;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 700;
      letter-spacing: .3px;
    }

    /* ── SPLIT OPTIONS ────────────────────── */
    .split-stack { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

    .split-card {
      background: var(--card);
      border-radius: var(--radius);
      border: 2px solid var(--border);
      padding: 16px;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: all .2s;
    }
    .split-card.chosen { border-color: var(--primary); background: #FFF2ED; }

    .sc-header { display: flex; align-items: center; gap: 12px; }
    .sc-radio {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 2px solid var(--border);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .15s;
    }
    .split-card.chosen .sc-radio { border-color: var(--primary); }
    .split-card.chosen .sc-radio::after {
      content: '';
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--primary);
      display: block;
    }
    .sc-text      { flex: 1; }
    .sc-title     { font-size: 15px; font-weight: 700; }
    .sc-desc      { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .sc-icon      { font-size: 22px; }

    .sc-detail {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .sc-input-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .sc-input-label { font-size: 13px; color: var(--muted); flex: 1; }
    .sc-input {
      width: 72px;
      padding: 9px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 17px;
      font-weight: 700;
      text-align: center;
      background: var(--bg);
      color: var(--text);
      -moz-appearance: textfield;
    }
    .sc-input:focus { outline: none; border-color: var(--primary); }
    .sc-input::-webkit-inner-spin-button,
    .sc-input::-webkit-outer-spin-button { opacity: 1; }

    .amount-pill {
      background: var(--bg);
      border-radius: 10px;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .pill-label  { font-size: 13px; color: var(--muted); }
    .pill-amount { font-size: 22px; font-weight: 900; color: var(--primary); }

    /* ── CONFIRM BTN ──────────────────────── */
    .pay-btn {
      width: 100%;
      padding: 17px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: .3px;
      box-shadow: 0 4px 18px rgba(200,68,42,.32);
      transition: all .2s;
    }
    .pay-btn:hover   { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 7px 22px rgba(200,68,42,.38); }
    .pay-btn:active  { transform: translateY(0); }
    .pay-btn:disabled {
      background: #DDD;
      color: var(--muted);
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    /* ── SUCCESS ──────────────────────────── */
    .success-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 72vh;
      padding: 40px 24px;
      text-align: center;
    }
    .success-ring {
      width: 88px; height: 88px;
      background: #EAF5EB;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 40px;
      margin-bottom: 24px;
      animation: pop .45s cubic-bezier(.175,.885,.32,1.275);
    }
    @keyframes pop {
      0%   { transform: scale(0); }
      100% { transform: scale(1); }
    }
    .success-title  { font-size: 26px; font-weight: 900; color: #2E7D32; margin-bottom: 8px; }
    .success-sub    { font-size: 15px; color: var(--muted); line-height: 1.55; margin-bottom: 28px; }
    .success-amount { font-size: 40px; font-weight: 900; color: var(--text); margin-bottom: 6px; }
    .success-detail { font-size: 13px; color: var(--muted); margin-bottom: 40px; }
    .ghost-btn {
      padding: 13px 36px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 30px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background .18s;
    }
    .ghost-btn:hover { background: var(--primary-dark); }

    /* ── UTILS ────────────────────────────── */
    .hidden { display: none !important; }
    .fade-in { animation: fadeUp .28s ease; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div id="app"></div>

<!-- QR Modal -->
<div id="overlay" class="overlay hidden" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-title" id="modal-title">Table QR Code</div>
    <div class="modal-sub">Scan to view and split the bill</div>
    <div id="qr-box"></div>
    <div class="modal-url" id="modal-url"></div>
    <button class="modal-close-btn" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
const S = {
  tables: [
    { id:1, guests:2, total:45.00,  paid:45.00  },
    { id:2, guests:4, total:87.00,  paid:0      },
    { id:3, guests:3, total:63.00,  paid:25.00  },
    { id:4, guests:7, total:122.00, paid:0      },
    { id:5, guests:2, total:38.00,  paid:38.00  },
    { id:6, guests:5, total:104.00, paid:0      },
  ],
  items: [
    { id:1, name:'Margherita Pizza',  price:18, qty:1 },
    { id:2, name:'Pasta Carbonara',   price:22, qty:1 },
    { id:3, name:'Grilled Salmon',    price:28, qty:1 },
    { id:4, name:'Caesar Salad',      price:14, qty:1 },
    { id:5, name:'Tiramisu',          price:10, qty:1 },
    { id:6, name:'Sparkling Water',   price:6,  qty:2 },
    { id:7, name:'House Wine',        price:24, qty:2 },
  ],
  option:      null,   // 'full' | 'split' | 'items'
  splitCount:  2,
  picked:      new Set(),
  showSuccess: false,
  lastPay:     null,
};

const TIP = 0.18;

// ═══════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════
const $  = id => document.getElementById(id);
const fmt = n  => '$' + n.toFixed(2);

function status(t) {
  if (t.paid >= t.total) return 'paid';
  if (t.paid > 0)        return 'partial';
  return 'unpaid';
}
function statusLabel(s) {
  return { paid:'Paid', partial:'Partial', unpaid:'Unpaid' }[s];
}

function subtotal()  { return S.items.reduce((a,i) => a + i.price, 0); }
function tipAmt()    { return subtotal() * TIP; }
function grandTotal(){ return subtotal() + tipAmt(); }

function pickedSubtotal() {
  return [...S.picked].reduce((a,id) => {
    const it = S.items.find(i => i.id === id);
    return a + (it ? it.price : 0);
  }, 0);
}
function pickedTotal() { return pickedSubtotal() * (1 + TIP); }

// ═══════════════════════════════════════════
//  ROUTING
// ═══════════════════════════════════════════
function route() {
  const h = window.location.hash;
  const m = h.match(/^#table\/(\d+)$/);
  if (m) return { view:'table', id:+m[1] };
  return { view:'dashboard' };
}

function render() {
  const r = route();
  $('app').innerHTML = r.view === 'table'
    ? renderBill(r.id)
    : renderDash();
}

// ═══════════════════════════════════════════
//  DASHBOARD
// ═══════════════════════════════════════════
function renderDash() {
  const total     = S.tables.reduce((a,t) => a + t.total, 0);
  const collected = S.tables.reduce((a,t) => a + t.paid, 0);
  const active    = S.tables.filter(t => status(t) !== 'paid').length;

  return `
    <div class="top-bar">
      <div>
        <h1>La Trattoria</h1>
        <div class="sub">Restaurant Dashboard</div>
      </div>
      <div class="logo">🍝</div>
    </div>
    <div class="dash-wrap fade-in">
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-val">${active}</div>
          <div class="stat-label">Active</div>
        </div>
        <div class="stat-card">
          <div class="stat-val">${fmt(collected)}</div>
          <div class="stat-label">Collected</div>
        </div>
        <div class="stat-card">
          <div class="stat-val">${fmt(total)}</div>
          <div class="stat-label">Revenue</div>
        </div>
      </div>
      <div class="section-label">Tables</div>
      <div class="tables-grid">
        ${S.tables.map(tableCard).join('')}
      </div>
    </div>
  `;
}

function tableCard(t) {
  const s   = status(t);
  const pct = Math.min(100, (t.paid / t.total) * 100);
  return `
    <div class="t-card ${t.id === 4 ? 'is-active' : ''}"
         onclick="window.location.hash='table/${t.id}'">
      <div class="t-head">
        <div>
          <div class="t-num">Table ${t.id}</div>
          <div class="t-guests">${t.guests} guest${t.guests !== 1 ? 's' : ''}</div>
        </div>
        <div class="badge badge-${s}">${statusLabel(s)}</div>
      </div>
      <div class="t-total">${fmt(t.total)}</div>
      <div class="prog-bar">
        <div class="prog-fill ${s === 'paid' ? 'full' : ''}"
             style="width:${pct}%"></div>
      </div>
      <button class="qr-btn"
              onclick="event.stopPropagation(); showQR(${t.id})">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <rect x="3" y="3" width="7" height="7"/>
          <rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/>
          <path d="M14 14h3v3h-3zM17 17h3v3h-3z"/>
        </svg>
        Generate QR
      </button>
    </div>
  `;
}

// ═══════════════════════════════════════════
//  BILL VIEW
// ═══════════════════════════════════════════
function renderBill(tid) {
  if (S.showSuccess) return renderSuccess();
  const t   = S.tables.find(x => x.id === tid) || S.tables[3];
  const sub = subtotal();
  const tip = tipAmt();
  const tot = grandTotal();

  return `
    <div class="bill-wrap fade-in">
      <div class="bill-hero">
        <button class="back-link" onclick="goHome()">← Dashboard</button>
        <div class="hero-name">La Trattoria</div>
        <div class="hero-meta">🍽️ Table ${tid} &nbsp;·&nbsp; ${t.guests} guests</div>
      </div>

      <div class="bill-body">
        <div class="section-label" style="margin-bottom:12px">Your order</div>

        <div class="card-block" style="margin-bottom:16px">
          ${S.items.map(item => `
            <div class="row-item">
              <div style="flex:1">
                <span class="item-name">${item.name}</span>
                ${item.qty > 1 ? `<span class="item-qty-tag">×${item.qty}</span>` : ''}
              </div>
              <div class="item-price">${fmt(item.price)}</div>
            </div>
          `).join('')}
        </div>

        <div class="summary-block">
          <div class="sum-row">
            <span>Subtotal</span><span>${fmt(sub)}</span>
          </div>
          <div class="sum-row">
            <span>Tip <span class="tip-chip">18% suggested</span></span>
            <span>${fmt(tip)}</span>
          </div>
          <div class="sum-row total-row">
            <span>Total</span><span>${fmt(tot)}</span>
          </div>
        </div>

        <div class="section-label" style="margin-bottom:12px">How would you like to pay?</div>

        <div class="split-stack">
          ${cardFull(tot)}
          ${cardSplit(tot)}
          ${cardItems()}
        </div>

        <button class="pay-btn"
                ${S.option && canPay() ? '' : 'disabled'}
                onclick="confirmPay(${tid})">
          ${S.option && canPay() ? 'Confirm Payment' : 'Select a payment option'}
        </button>
      </div>
    </div>
  `;
}

function canPay() {
  if (S.option === 'full')  return true;
  if (S.option === 'split') return S.splitCount >= 1;
  if (S.option === 'items') return S.picked.size > 0;
  return false;
}

function cardFull(tot) {
  const on = S.option === 'full';
  return `
    <div class="split-card ${on ? 'chosen' : ''}" onclick="pick('full')">
      <div class="sc-header">
        <div class="sc-radio"></div>
        <div class="sc-text">
          <div class="sc-title">Pay full bill</div>
          <div class="sc-desc">Cover the entire table</div>
        </div>
        <div class="sc-icon">💳</div>
      </div>
      ${on ? `
        <div class="sc-detail">
          <div class="amount-pill">
            <span class="pill-label">You'll pay</span>
            <span class="pill-amount">${fmt(tot)}</span>
          </div>
        </div>
      ` : ''}
    </div>
  `;
}

function cardSplit(tot) {
  const on  = S.option === 'split';
  const per = tot / Math.max(1, S.splitCount);
  return `
    <div class="split-card ${on ? 'chosen' : ''}" onclick="pick('split')">
      <div class="sc-header">
        <div class="sc-radio"></div>
        <div class="sc-text">
          <div class="sc-title">Split equally</div>
          <div class="sc-desc">Divide evenly among the group</div>
        </div>
        <div class="sc-icon">🤝</div>
      </div>
      ${on ? `
        <div class="sc-detail">
          <div class="sc-input-row">
            <span class="sc-input-label">Number of people</span>
            <input type="number" class="sc-input" id="split-n"
                   min="1" max="20" value="${S.splitCount}"
                   oninput="setSplit(this.value)"
                   onclick="event.stopPropagation()">
          </div>
          <div class="amount-pill">
            <span class="pill-label">Each person pays</span>
            <span class="pill-amount">${fmt(per)}</span>
          </div>
        </div>
      ` : ''}
    </div>
  `;
}

function cardItems() {
  const on  = S.option === 'items';
  const tot = pickedTotal();
  return `
    <div class="split-card ${on ? 'chosen' : ''}" onclick="pick('items')">
      <div class="sc-header">
        <div class="sc-radio"></div>
        <div class="sc-text">
          <div class="sc-title">Pay my items</div>
          <div class="sc-desc">Select only what you ordered</div>
        </div>
        <div class="sc-icon">🧾</div>
      </div>
      ${on ? `
        <div class="sc-detail">
          <div class="card-block" style="margin-bottom:10px">
            ${S.items.map(item => `
              <div class="row-item clickable ${S.picked.has(item.id) ? 'picked' : ''}"
                   onclick="event.stopPropagation(); toggleItem(${item.id})">
                <div class="check-circle">${S.picked.has(item.id) ? '✓' : ''}</div>
                <div style="flex:1">
                  <span class="item-name">${item.name}</span>
                  ${item.qty > 1 ? `<span class="item-qty-tag">×${item.qty}</span>` : ''}
                </div>
                <div class="item-price">${fmt(item.price)}</div>
              </div>
            `).join('')}
          </div>
          <div class="amount-pill">
            <span class="pill-label">Your total (incl. tip)</span>
            <span class="pill-amount">${S.picked.size > 0 ? fmt(tot) : '—'}</span>
          </div>
        </div>
      ` : ''}
    </div>
  `;
}

function renderSuccess() {
  const { amount, method } = S.lastPay || {};
  return `
    <div class="bill-wrap fade-in">
      <div class="bill-hero" style="padding-bottom:24px">
        <div class="hero-name">La Trattoria</div>
        <div class="hero-meta">🍽️ Table 4</div>
      </div>
      <div class="success-wrap">
        <div class="success-ring">✓</div>
        <div class="success-title">Payment Successful!</div>
        <div class="success-sub">Thank you for dining with us.<br>We hope to see you again soon!</div>
        <div class="success-amount">${fmt(amount || 0)}</div>
        <div class="success-detail">${method || ''}</div>
        <button class="ghost-btn" onclick="goHome()">Back to Dashboard</button>
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════════
//  ACTIONS
// ═══════════════════════════════════════════
function pick(opt) {
  S.option = opt;
  repaint();
}

function setSplit(val) {
  S.splitCount = Math.max(1, parseInt(val) || 1);
  repaint();
}

function toggleItem(id) {
  S.picked.has(id) ? S.picked.delete(id) : S.picked.add(id);
  repaint();
}

function confirmPay(tid) {
  if (!S.option || !canPay()) return;

  let amount = 0, method = '';
  const tot = grandTotal();

  if (S.option === 'full') {
    amount = tot;
    method = 'Full bill paid';
  } else if (S.option === 'split') {
    amount = tot / S.splitCount;
    method = `Split equally among ${S.splitCount} ${S.splitCount === 1 ? 'person' : 'people'}`;
  } else {
    amount = pickedTotal();
    method = `${S.picked.size} item${S.picked.size !== 1 ? 's' : ''} selected`;
  }

  const t = S.tables.find(x => x.id === tid);
  if (t) t.paid = Math.min(t.total, t.paid + Math.min(amount, t.total));

  S.lastPay     = { amount, method };
  S.showSuccess = true;
  repaint();
}

function goHome() {
  S.option      = null;
  S.picked      = new Set();
  S.showSuccess = false;
  S.lastPay     = null;
  window.location.hash = '#dashboard';
}

function repaint() {
  const r = route();
  if (r.view === 'table') {
    $('app').innerHTML = renderBill(r.id);
  }
}

// ═══════════════════════════════════════════
//  QR CODE
// ═══════════════════════════════════════════
function showQR(tid) {
  const url = window.location.origin + window.location.pathname + '#table/' + tid;
  $('modal-title').textContent = 'Table ' + tid + ' — QR Code';
  $('modal-url').textContent   = url;

  const box = $('qr-box');
  box.innerHTML = '';

  if (typeof QRCode !== 'undefined') {
    new QRCode(box, {
      text:  url,
      width: 200, height: 200,
      colorDark:  '#2C1810',
      colorLight: '#FFFFFF',
      correctLevel: QRCode.CorrectLevel.M,
    });
  } else {
    box.innerHTML = `
      <div style="width:200px;height:200px;background:var(--bg);border-radius:8px;
                  display:flex;align-items:center;justify-content:center;
                  color:var(--muted);font-size:12px;text-align:center;padding:16px">
        QR library not loaded.<br>Check your connection.
      </div>`;
  }

  $('overlay').classList.remove('hidden');
}

function closeModal() {
  $('overlay').classList.add('hidden');
  $('qr-box').innerHTML = '';
}

function handleOverlayClick(e) {
  if (e.target === $('overlay')) closeModal();
}

// ═══════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════
window.addEventListener('hashchange', () => {
  S.option      = null;
  S.showSuccess = false;
  render();
});

if (!window.location.hash || window.location.hash === '#') {
  window.location.hash = '#dashboard';
} else {
  render();
}
</script>
</body>
</html>
