<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TabL</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:           #FAFAFA;
      --card:         #FFFFFF;
      --text:         #111111;
      --muted:        #6B7280;
      --border:       #E5E7EB;
      --accent:       #2D6BE4;
      --accent-dark:  #2558C4;
      --accent-bg:    #EEF3FD;
      --success:      #16A34A;
      --success-bg:   #F0FDF4;
      --warning:      #D97706;
      --danger:       #DC2626;
      --shadow-sm:    0 1px 2px rgba(0,0,0,.05);
      --shadow:       0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md:    0 4px 6px rgba(0,0,0,.05), 0 2px 4px rgba(0,0,0,.04);
      --radius:       8px;
      --radius-lg:    12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── TOP BAR ──────────────────────────────── */
    .top-bar {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      height: 52px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .wordmark  { font-size: 17px; font-weight: 800; color: var(--text); letter-spacing: -0.6px; }
    .top-label { font-size: 12px; color: var(--muted); font-weight: 500; }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 12px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .back-link:hover { border-color: var(--text); color: var(--text); }

    /* ── DASHBOARD ────────────────────────────── */
    .dash-wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 32px 24px;
    }
    .page-header { margin-bottom: 28px; }
    .page-title  { font-size: 24px; font-weight: 700; letter-spacing: -.4px; margin-bottom: 4px; }
    .page-sub    { font-size: 13px; color: var(--muted); }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      box-shadow: var(--shadow-sm);
    }
    .stat-val   { font-size: 22px; font-weight: 700; letter-spacing: -.5px; }
    .stat-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; margin-top: 4px; }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .tables-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    @media(min-width: 580px) { .tables-grid { grid-template-columns: repeat(3, 1fr); } }

    .t-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: box-shadow .15s, border-color .15s;
    }
    .t-card:hover    { box-shadow: var(--shadow-md); border-color: #D1D5DB; }
    .t-card.is-active { border-color: var(--accent); }

    .t-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 14px;
    }
    .t-num    { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
    .t-guests { font-size: 12px; color: var(--muted); }

    .s-dot {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 500;
    }
    .s-dot .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .s-paid    { color: var(--success); }
    .s-paid    .dot { background: var(--success); }
    .s-partial { color: var(--warning); }
    .s-partial .dot { background: var(--warning); }
    .s-unpaid  { color: var(--muted); }
    .s-unpaid  .dot { background: #D1D5DB; }

    .t-total { font-size: 18px; font-weight: 700; letter-spacing: -.4px; margin-bottom: 12px; }

    .prog-bar { height: 3px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 14px; }
    .prog-fill { height: 100%; border-radius: 3px; background: var(--accent); transition: width .5s ease; }
    .prog-fill.full { background: var(--success); }

    .qr-btn {
      width: 100%;
      padding: 7px 0;
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: border-color .15s, color .15s, background .15s;
    }
    .qr-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

    /* ── QR MODAL ─────────────────────────────── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.4);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .overlay.hidden { display: none; }
    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px 24px 24px;
      max-width: 320px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,.12);
    }
    .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .modal-sub   { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
    #qr-box { display: flex; justify-content: center; margin-bottom: 16px; }
    #qr-box canvas, #qr-box img { border-radius: 6px; border: 1px solid var(--border); }
    .modal-url {
      font-size: 10px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px 12px;
      border-radius: var(--radius);
      word-break: break-all;
      margin-bottom: 16px;
      text-align: left;
    }
    .modal-close-btn {
      width: 100%;
      padding: 10px;
      background: var(--text);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    .modal-close-btn:hover { background: #333; }

    /* ── BILL VIEW ────────────────────────────── */
    .bill-wrap {
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: 56px;
    }
    .receipt-header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 24px 24px 20px;
    }
    .receipt-venue { font-size: 22px; font-weight: 800; letter-spacing: -.5px; margin-bottom: 6px; }
    .receipt-meta  { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
    .receipt-meta .sep { color: var(--border); }

    .bill-body { padding: 24px 16px 0; }

    .card-block {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }
    .row-item {
      display: flex;
      align-items: center;
      padding: 13px 16px;
      border-bottom: 1px solid var(--border);
    }
    .row-item:last-child { border-bottom: none; }
    .row-item.clickable  { cursor: pointer; transition: background .12s; }
    .row-item.clickable:hover { background: var(--bg); }
    .row-item.picked     { background: var(--accent-bg); }

    .check-circle {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      margin-right: 12px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700;
      transition: all .14s;
    }
    .row-item.picked .check-circle { background: var(--accent); border-color: var(--accent); color: #fff; }

    .item-name { font-size: 14px; color: var(--text); font-weight: 400; }
    .item-qty-tag {
      font-size: 11px; color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 4px; padding: 1px 5px;
      margin-left: 7px; font-weight: 500;
    }
    .item-price { font-size: 14px; font-weight: 600; color: var(--text); flex-shrink: 0; margin-left: 8px; }

    .summary-block {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      box-shadow: var(--shadow-sm);
    }
    .sum-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .sum-row:last-child { margin-bottom: 0; }
    .sum-row.total-row {
      font-size: 16px; font-weight: 700; color: var(--text);
      padding-top: 12px; margin-top: 4px;
      border-top: 1px solid var(--border);
    }
    .tip-tag {
      font-size: 10px; font-weight: 600; color: var(--accent);
      border: 1px solid #BFDBFE; background: #EFF6FF;
      padding: 2px 7px; border-radius: 4px;
      margin-left: 6px; letter-spacing: .2px;
    }

    /* ── SPLIT OPTIONS ────────────────────────── */
    .split-stack { display: flex; flex-direction: column; gap: 8px; }

    .split-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: border-color .15s;
    }
    .split-card:hover  { border-color: #D1D5DB; }
    .split-card.chosen { border-color: var(--accent); background: var(--accent-bg); }

    .sc-header { display: flex; align-items: center; gap: 12px; }
    .sc-radio {
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .15s;
    }
    .split-card.chosen .sc-radio { border-color: var(--accent); border-width: 2px; }
    .split-card.chosen .sc-radio::after {
      content: ''; width: 8px; height: 8px;
      border-radius: 50%; background: var(--accent); display: block;
    }
    .sc-text  { flex: 1; }
    .sc-title { font-size: 14px; font-weight: 600; }
    .sc-desc  { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .sc-icon  {
      font-size: 16px;
      width: 32px; height: 32px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .sc-detail { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }

    .sc-input-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .sc-input-label { font-size: 13px; color: var(--muted); flex: 1; }
    .sc-input {
      width: 68px; padding: 8px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 16px; font-weight: 700;
      text-align: center; background: var(--card); color: var(--text);
      -moz-appearance: textfield;
      transition: border-color .15s;
    }
    .sc-input:focus { outline: none; border-color: var(--accent); }
    .sc-input::-webkit-inner-spin-button,
    .sc-input::-webkit-outer-spin-button { opacity: 1; }

    .amount-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
    }
    .split-card.chosen .amount-row { background: #fff; }
    .pill-label  { font-size: 12px; color: var(--muted); font-weight: 500; }
    .pill-amount { font-size: 20px; font-weight: 800; color: var(--accent); letter-spacing: -.5px; }

    /* ── PAYMENT METHOD SCREEN ────────────────── */
    .pm-body {
      padding: 28px 16px 0;
    }
    .pm-header { margin-bottom: 24px; }
    .pm-title  { font-size: 20px; font-weight: 700; letter-spacing: -.4px; margin-bottom: 6px; }
    .pm-amount-label { font-size: 13px; color: var(--muted); }
    .pm-amount-label strong { color: var(--text); font-weight: 700; }

    .pm-stack { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }

    .pm-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: var(--shadow-sm);
      transition: border-color .15s, background .15s;
    }
    .pm-card:hover  { border-color: #D1D5DB; }
    .pm-card.chosen { border-color: var(--accent); background: var(--accent-bg); }

    .pm-icon {
      width: 44px; height: 44px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      color: var(--text);
      transition: background .15s, border-color .15s, color .15s;
    }
    .pm-card.chosen .pm-icon { background: #fff; border-color: #BFDBFE; color: var(--accent); }
    .pm-icon svg { width: 22px; height: 22px; }

    .pm-info { flex: 1; }
    .pm-label { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .pm-sub   { font-size: 12px; color: var(--muted); }

    .pm-radio {
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .15s;
    }
    .pm-card.chosen .pm-radio { border-color: var(--accent); border-width: 2px; }
    .pm-card.chosen .pm-radio::after {
      content: ''; width: 8px; height: 8px;
      border-radius: 50%; background: var(--accent); display: block;
    }

    /* ── PROCESSING SCREEN ────────────────────── */
    .processing-wrap {
      min-height: calc(100vh - 52px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 40px;
      text-align: center;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .processing-text { font-size: 16px; font-weight: 600; color: var(--text); }
    .processing-sub  { font-size: 13px; color: var(--muted); }

    /* ── SUCCESS SCREEN ───────────────────────── */
    .success-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 52px);
      padding: 40px 24px;
      text-align: center;
    }
    .success-icon {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: var(--success-bg);
      border: 1.5px solid #BBF7D0;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
      animation: pop .4s cubic-bezier(.175,.885,.32,1.275);
    }
    .success-icon svg { width: 28px; height: 28px; stroke: var(--success); stroke-width: 2.5; }
    @keyframes pop { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .success-label  { font-size: 12px; font-weight: 600; color: var(--success); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 8px; }
    .success-amount { font-size: 44px; font-weight: 800; color: var(--text); letter-spacing: -1.5px; margin-bottom: 4px; }
    .success-via    { font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    .success-sub    { font-size: 14px; color: var(--muted); margin-bottom: 36px; line-height: 1.55; }

    .success-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
      max-width: 280px;
    }

    /* ── CLOSED SCREEN ────────────────────────── */
    .closed-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 52px);
      padding: 40px 24px;
      text-align: center;
    }
    .closed-check {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--card);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
    }
    .closed-check svg { width: 22px; height: 22px; stroke: var(--success); stroke-width: 2.5; }
    .closed-title { font-size: 20px; font-weight: 700; letter-spacing: -.4px; margin-bottom: 8px; }
    .closed-sub   { font-size: 14px; color: var(--muted); line-height: 1.55; }

    /* ── BUTTONS ──────────────────────────────── */
    .pay-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-lg);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .1px;
      transition: background .15s, transform .1s;
    }
    .pay-btn:hover  { background: var(--accent-dark); }
    .pay-btn:active { transform: scale(.99); }
    .pay-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; transform: none; }

    .outline-btn {
      width: 100%;
      padding: 13px;
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius-lg);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .outline-btn:hover { border-color: #9CA3AF; background: var(--bg); }

    .text-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      padding: 8px;
      transition: color .15s;
    }
    .text-btn:hover { color: var(--text); }

    /* ── STEPPER ──────────────────────────────── */
    .stepper {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .step-btn {
      width: 26px; height: 26px;
      border-radius: 50%;
      border: 1.5px solid var(--accent);
      background: none;
      color: var(--accent);
      font-size: 15px;
      font-weight: 600;
      line-height: 1;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .12s, color .12s;
      flex-shrink: 0;
    }
    .step-btn:hover:not(:disabled) { background: var(--accent); color: #fff; }
    .step-btn:disabled { border-color: var(--border); color: var(--muted); cursor: default; }
    .step-val {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      min-width: 18px;
      text-align: center;
    }

    /* ── UTILITIES ────────────────────────────── */
    .hidden { display: none !important; }
    .mb-16  { margin-bottom: 16px; }
    .mb-20  { margin-bottom: 20px; }
    .mb-24  { margin-bottom: 24px; }

    .fade-in { animation: fadeUp .22s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<div id="app"></div>

<!-- QR Modal -->
<div id="overlay" class="overlay hidden" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-title" id="modal-title">QR Code</div>
    <div class="modal-sub">Scan to view and split the bill</div>
    <div id="qr-box"></div>
    <div class="modal-url" id="modal-url"></div>
    <button class="modal-close-btn" onclick="closeModal()">Done</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
const S = {
  tables: [
    { id:1, guests:2, total:45.00,  paid:45.00  },
    { id:2, guests:4, total:87.00,  paid:0      },
    { id:3, guests:3, total:63.00,  paid:25.00  },
    { id:4, guests:7, total:122.00, paid:0      },
    { id:5, guests:2, total:38.00,  paid:38.00  },
    { id:6, guests:5, total:104.00, paid:0      },
  ],
  items: [
    { id:1, name:'Margherita Pizza',  price:18, qty:1 },
    { id:2, name:'Pasta Carbonara',   price:22, qty:1 },
    { id:3, name:'Grilled Salmon',    price:28, qty:1 },
    { id:4, name:'Caesar Salad',      price:14, qty:1 },
    { id:5, name:'Tiramisu',          price:10, qty:1 },
    { id:6, name:'Sparkling Water',   price:6,  qty:2 },
    { id:7, name:'House Wine',        price:24, qty:2 },
  ],
  // split selection state
  option:      null,   // 'full' | 'split' | 'items'
  splitCount:  2,
  picked:      {},            // { itemId: quantitySelected }
  // payment flow state
  screen:      'bill', // 'bill' | 'payment' | 'processing' | 'success' | 'closed'
  payMethod:   null,   // 'apple' | 'card' | 'reader'
  pendingPay:  null,   // { amount, splitDesc, tid }
  lastPay:     null,   // { amount, payMethodLabel }
};

const TIP = 0.18;

const PAY_METHODS = {
  apple: { label: 'Apple Pay',          sub: 'Touch ID or Face ID' },
  card:  { label: 'Credit / Debit Card', sub: 'Visa, Mastercard, Amex' },
  reader:{ label: 'Card Reader',         sub: 'Tap or insert your card' },
};

// ═══════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════
const $   = id => document.getElementById(id);
const fmt = n  => '$' + n.toFixed(2);

function status(t) {
  if (t.paid >= t.total) return 'paid';
  if (t.paid > 0)        return 'partial';
  return 'unpaid';
}
function statusLabel(s) {
  return { paid:'Paid', partial:'Partial', unpaid:'Unpaid' }[s];
}

function subtotal()   { return S.items.reduce((a,i) => a + i.price, 0); }
function tipAmt()     { return subtotal() * TIP; }
function grandTotal() { return subtotal() + tipAmt(); }

function pickedSubtotal() {
  return Object.entries(S.picked).reduce((a, [id, qty]) => {
    const it = S.items.find(i => i.id === +id);
    return a + (it ? (it.price / it.qty) * qty : 0);
  }, 0);
}
function pickedTotal() { return pickedSubtotal() * (1 + TIP); }

// ═══════════════════════════════════════════
//  ROUTING
// ═══════════════════════════════════════════
function route() {
  const h = window.location.hash;
  const m = h.match(/^#table\/(\d+)$/);
  if (m) return { view:'table', id:+m[1] };
  return { view:'dashboard' };
}

function render() {
  const r = route();
  $('app').innerHTML = r.view === 'table'
    ? renderBill(r.id)
    : renderDash();
}

// ═══════════════════════════════════════════
//  DASHBOARD
// ═══════════════════════════════════════════
function renderDash() {
  const total     = S.tables.reduce((a,t) => a + t.total, 0);
  const collected = S.tables.reduce((a,t) => a + t.paid, 0);
  const active    = S.tables.filter(t => status(t) !== 'paid').length;
  const today     = new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });

  return `
    <div class="top-bar">
      <div class="wordmark">TabL</div>
      <span class="top-label">Dashboard</span>
    </div>
    <div class="dash-wrap fade-in">
      <div class="page-header">
        <h1 class="page-title">Floor overview</h1>
        <p class="page-sub">${today}</p>
      </div>
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-val">${active}</div>
          <div class="stat-label">Active tables</div>
        </div>
        <div class="stat-card">
          <div class="stat-val">${fmt(collected)}</div>
          <div class="stat-label">Collected</div>
        </div>
        <div class="stat-card">
          <div class="stat-val">${fmt(total)}</div>
          <div class="stat-label">Total revenue</div>
        </div>
      </div>
      <div class="section-label">Tables</div>
      <div class="tables-grid">
        ${S.tables.map(tableCard).join('')}
      </div>
    </div>
  `;
}

function tableCard(t) {
  const s   = status(t);
  const pct = Math.min(100, (t.paid / t.total) * 100);
  return `
    <div class="t-card ${t.id === 4 ? 'is-active' : ''}"
         onclick="window.location.hash='table/${t.id}'">
      <div class="t-head">
        <div>
          <div class="t-num">Table ${t.id}</div>
          <div class="t-guests">${t.guests} guest${t.guests !== 1 ? 's' : ''}</div>
        </div>
        <div class="s-dot s-${s}"><span class="dot"></span>${statusLabel(s)}</div>
      </div>
      <div class="t-total">${fmt(t.total)}</div>
      <div class="prog-bar">
        <div class="prog-fill ${s === 'paid' ? 'full' : ''}" style="width:${pct}%"></div>
      </div>
      <button class="qr-btn" onclick="event.stopPropagation(); showQR(${t.id})">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="square">
          <rect x="3" y="3" width="7" height="7"/>
          <rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/>
          <path d="M14 14h3v3h-3zM17 17h3v3h-3z"/>
        </svg>
        QR Code
      </button>
    </div>
  `;
}

// ═══════════════════════════════════════════
//  BILL VIEW  (routes to sub-screens via S.screen)
// ═══════════════════════════════════════════
function renderBill(tid) {
  if (S.screen === 'payment')    return renderPaymentMethod();
  if (S.screen === 'processing') return renderProcessing();
  if (S.screen === 'success')    return renderSuccess();
  if (S.screen === 'closed')     return renderClosed();

  const t   = S.tables.find(x => x.id === tid) || S.tables[3];
  const sub = subtotal();
  const tip = tipAmt();
  const tot = grandTotal();

  return `
    <div class="bill-wrap fade-in">
      <div class="top-bar">
        <div class="wordmark">TabL</div>
        <button class="back-link" onclick="goHome()">← Back</button>
      </div>
      <div class="receipt-header">
        <div class="receipt-venue">La Trattoria</div>
        <div class="receipt-meta">
          Table ${tid}<span class="sep">·</span>${t.guests} guests
        </div>
      </div>
      <div class="bill-body">
        <div class="section-label mb-16">Order</div>
        <div class="card-block mb-16">
          ${S.items.map(item => `
            <div class="row-item">
              <div style="flex:1">
                <span class="item-name">${item.name}</span>
                ${item.qty > 1 ? `<span class="item-qty-tag">×${item.qty}</span>` : ''}
              </div>
              <div class="item-price">${fmt(item.price)}</div>
            </div>
          `).join('')}
        </div>
        <div class="summary-block mb-24">
          <div class="sum-row">
            <span>Subtotal</span><span>${fmt(sub)}</span>
          </div>
          <div class="sum-row">
            <span>Tip<span class="tip-tag">18% suggested</span></span>
            <span>${fmt(tip)}</span>
          </div>
          <div class="sum-row total-row">
            <span>Total</span><span>${fmt(tot)}</span>
          </div>
        </div>
        <div class="section-label mb-16">Payment method</div>
        <div class="split-stack mb-20">
          ${cardFull(tot)}
          ${cardSplit(tot)}
          ${cardItems()}
        </div>
        <button class="pay-btn"
                ${S.option && canPay() ? '' : 'disabled'}
                onclick="confirmPay(${tid})">
          ${S.option && canPay() ? 'Confirm payment' : 'Select a payment method'}
        </button>
      </div>
    </div>
  `;
}

function canPay() {
  if (S.option === 'full')  return true;
  if (S.option === 'split') return S.splitCount >= 1;
  if (S.option === 'items') return Object.keys(S.picked).length > 0;
  return false;
}

// ── split option cards ──
function cardFull(tot) {
  const on = S.option === 'full';
  return `
    <div class="split-card ${on ? 'chosen' : ''}" onclick="pick('full')">
      <div class="sc-header">
        <div class="sc-radio"></div>
        <div class="sc-text">
          <div class="sc-title">Pay full bill</div>
          <div class="sc-desc">Cover the entire table</div>
        </div>
        <div class="sc-icon">💳</div>
      </div>
      ${on ? `
        <div class="sc-detail">
          <div class="amount-row">
            <span class="pill-label">You'll pay</span>
            <span class="pill-amount">${fmt(tot)}</span>
          </div>
        </div>` : ''}
    </div>`;
}

function cardSplit(tot) {
  const on  = S.option === 'split';
  const per = tot / Math.max(1, S.splitCount);
  return `
    <div class="split-card ${on ? 'chosen' : ''}" onclick="pick('split')">
      <div class="sc-header">
        <div class="sc-radio"></div>
        <div class="sc-text">
          <div class="sc-title">Split equally</div>
          <div class="sc-desc">Divide evenly among the group</div>
        </div>
        <div class="sc-icon">÷</div>
      </div>
      ${on ? `
        <div class="sc-detail">
          <div class="sc-input-row">
            <span class="sc-input-label">Number of people</span>
            <input type="number" class="sc-input" id="split-n"
                   min="1" max="20" value="${S.splitCount}"
                   oninput="setSplit(this.value)"
                   onclick="event.stopPropagation()">
          </div>
          <div class="amount-row">
            <span class="pill-label">Each person pays</span>
            <span class="pill-amount">${fmt(per)}</span>
          </div>
        </div>` : ''}
    </div>`;
}

function cardItems() {
  const on    = S.option === 'items';
  const tot   = pickedTotal();
  const count = Object.keys(S.picked).length;
  return `
    <div class="split-card ${on ? 'chosen' : ''}" onclick="pick('items')">
      <div class="sc-header">
        <div class="sc-radio"></div>
        <div class="sc-text">
          <div class="sc-title">Pay my items</div>
          <div class="sc-desc">Select only what you ordered</div>
        </div>
        <div class="sc-icon">☑</div>
      </div>
      ${on ? `
        <div class="sc-detail">
          <div class="card-block" style="margin-bottom:10px">
            ${S.items.map(item => {
              const sel       = item.id in S.picked;
              const selQty    = sel ? (S.picked[item.id] || 1) : 1;
              const unitPrice = item.price / item.qty;
              return `
              <div class="row-item clickable ${sel ? 'picked' : ''}"
                   onclick="event.stopPropagation(); toggleItem(${item.id})">
                <div class="check-circle">${sel ? '✓' : ''}</div>
                <div style="flex:1;min-width:0">
                  <span class="item-name">${item.name}</span>
                  ${item.qty > 1 ? `<span class="item-qty-tag">×${item.qty}</span>` : ''}
                </div>
                ${sel && item.qty > 1 ? `
                  <div class="stepper" onclick="event.stopPropagation()">
                    <button class="step-btn" onclick="setItemQty(${item.id},${selQty - 1})"${selQty <= 1 ? ' disabled' : ''}>−</button>
                    <span class="step-val">${selQty}</span>
                    <button class="step-btn" onclick="setItemQty(${item.id},${selQty + 1})"${selQty >= item.qty ? ' disabled' : ''}>+</button>
                  </div>
                  <div class="item-price" style="margin-left:10px">${fmt(unitPrice * selQty)}</div>
                ` : `<div class="item-price">${fmt(item.price)}</div>`}
              </div>`;
            }).join('')}
          </div>
          <div class="amount-row">
            <span class="pill-label">Your total (incl. tip)</span>
            <span class="pill-amount">${count > 0 ? fmt(tot) : '—'}</span>
          </div>
        </div>` : ''}
    </div>`;
}

// ═══════════════════════════════════════════
//  PAYMENT METHOD SCREEN
// ═══════════════════════════════════════════
function renderPaymentMethod() {
  const amount = S.pendingPay ? S.pendingPay.amount : 0;
  return `
    <div class="bill-wrap fade-in">
      <div class="top-bar">
        <div class="wordmark">TabL</div>
        <button class="back-link" onclick="cancelPayment()">← Back</button>
      </div>
      <div class="pm-body">
        <div class="pm-header">
          <h2 class="pm-title">Choose payment method</h2>
          <p class="pm-amount-label">You'll pay <strong>${fmt(amount)}</strong></p>
        </div>
        <div class="pm-stack">
          ${pmCard('apple',  appleSVG())}
          ${pmCard('card',   cardSVG())}
          ${pmCard('reader', readerSVG())}
        </div>
        <button class="pay-btn"
                ${S.payMethod ? '' : 'disabled'}
                onclick="startPayment()">
          Pay ${fmt(amount)}
        </button>
      </div>
    </div>`;
}

function pmCard(key, iconSVG) {
  const m  = PAY_METHODS[key];
  const on = S.payMethod === key;
  return `
    <div class="pm-card ${on ? 'chosen' : ''}" onclick="selectPayMethod('${key}')">
      <div class="pm-icon">${iconSVG}</div>
      <div class="pm-info">
        <div class="pm-label">${m.label}</div>
        <div class="pm-sub">${m.sub}</div>
      </div>
      <div class="pm-radio"></div>
    </div>`;
}

function appleSVG() {
  return `<svg viewBox="0 0 24 24" fill="currentColor">
    <path d="M17.05 20.28c-.98 1.22-2.1 2.44-3.38 2.47-1.31.02-1.73-.78-3.22-.78-1.51 0-1.97.76-3.2.8-1.25.04-2.35-1.31-3.34-2.53C1.67 17.56.44 12.88 2.21 9.7c.87-1.55 2.44-2.54 4.14-2.56 1.3-.02 2.52.87 3.31.87.8 0 2.29-1.08 3.86-.92.66.03 2.5.27 3.69 2.03-.09.06-2.2 1.28-2.18 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.66 3.31zM13 3.5c.73-.84 1.95-1.47 2.96-1.5.12 1.19-.34 2.38-1.05 3.22-.7.86-1.84 1.52-2.96 1.43-.14-1.16.42-2.36 1.05-3.15z"/>
  </svg>`;
}

function cardSVG() {
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <rect x="2" y="6" width="20" height="13" rx="2.5"/>
    <path d="M2 10h20"/>
    <path d="M6 14.5h4"/>
  </svg>`;
}

function readerSVG() {
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <rect x="6" y="2" width="12" height="20" rx="2"/>
    <path d="M9.5 6.5h5"/>
    <rect x="8.5" y="10" width="7" height="5" rx="1"/>
    <path d="M10.5 18.5h3"/>
  </svg>`;
}

// ═══════════════════════════════════════════
//  PROCESSING SCREEN
// ═══════════════════════════════════════════
function renderProcessing() {
  const m = S.payMethod ? PAY_METHODS[S.payMethod].label : '';
  const a = S.pendingPay ? fmt(S.pendingPay.amount) : '';
  return `
    <div class="bill-wrap fade-in">
      <div class="top-bar">
        <div class="wordmark">TabL</div>
      </div>
      <div class="processing-wrap">
        <div class="spinner"></div>
        <div class="processing-text">Processing…</div>
        <div class="processing-sub">${m} · ${a}</div>
      </div>
    </div>`;
}

// ═══════════════════════════════════════════
//  SUCCESS SCREEN
// ═══════════════════════════════════════════
function renderSuccess() {
  const { amount, payMethodLabel } = S.lastPay || {};
  return `
    <div class="bill-wrap fade-in">
      <div class="top-bar">
        <div class="wordmark">TabL</div>
      </div>
      <div class="success-wrap">
        <div class="success-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <div class="success-label">Payment confirmed</div>
        <div class="success-amount">${fmt(amount || 0)}</div>
        <div class="success-via">${payMethodLabel || ''}</div>
        <div class="success-sub">Thank you for dining<br>at La Trattoria.</div>
        <div class="success-actions">
          <button class="pay-btn" onclick="addAnotherPayment()">Add another payment</button>
          <button class="outline-btn" onclick="showClosed()">Done</button>
        </div>
      </div>
    </div>`;
}

// ═══════════════════════════════════════════
//  CLOSED SCREEN
// ═══════════════════════════════════════════
function renderClosed() {
  return `
    <div class="bill-wrap fade-in">
      <div class="top-bar">
        <div class="wordmark">TabL</div>
      </div>
      <div class="closed-wrap">
        <div class="closed-check">
          <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <h2 class="closed-title">You're all set!</h2>
        <p class="closed-sub">You can close this tab.</p>
      </div>
    </div>`;
}

// ═══════════════════════════════════════════
//  ACTIONS
// ═══════════════════════════════════════════
function pick(opt) {
  S.option = opt;
  repaint();
}

function setSplit(val) {
  S.splitCount = Math.max(1, parseInt(val) || 1);
  repaint();
}

function toggleItem(id) {
  if (id in S.picked) {
    delete S.picked[id];
  } else {
    S.picked[id] = 1;
  }
  repaint();
}

function setItemQty(id, qty) {
  const item = S.items.find(i => i.id === id);
  if (!item) return;
  S.picked[id] = Math.max(1, Math.min(item.qty, qty));
  repaint();
}

function confirmPay(tid) {
  if (!S.option || !canPay()) return;

  let amount = 0, splitDesc = '';
  const tot = grandTotal();

  if (S.option === 'full') {
    amount    = tot;
    splitDesc = 'Full bill';
  } else if (S.option === 'split') {
    amount    = tot / S.splitCount;
    splitDesc = `Split among ${S.splitCount}`;
  } else {
    amount    = pickedTotal();
    const n = Object.keys(S.picked).length;
    splitDesc = `${n} item${n !== 1 ? 's' : ''}`;
  }

  S.pendingPay = { amount, splitDesc, tid };
  S.screen     = 'payment';
  repaint();
}

function selectPayMethod(key) {
  S.payMethod = key;
  repaint();
}

function cancelPayment() {
  S.screen     = 'bill';
  S.payMethod  = null;
  S.pendingPay = null;
  repaint();
}

function startPayment() {
  if (!S.payMethod || !S.pendingPay) return;
  S.screen = 'processing';
  repaint();

  setTimeout(() => {
    const { amount, tid } = S.pendingPay;
    const t = S.tables.find(x => x.id === tid);
    if (t) t.paid = Math.min(t.total, t.paid + amount);

    S.lastPay = {
      amount,
      payMethodLabel: PAY_METHODS[S.payMethod].label,
    };
    S.screen = 'success';
    repaint();
  }, 1500);
}

function addAnotherPayment() {
  S.screen     = 'bill';
  S.option     = null;
  S.picked     = {};
  S.payMethod  = null;
  S.pendingPay = null;
  repaint();
}

function showClosed() {
  S.screen = 'closed';
  repaint();
}

function goHome() {
  S.option     = null;
  S.picked     = {};
  S.screen     = 'bill';
  S.payMethod  = null;
  S.pendingPay = null;
  S.lastPay    = null;
  window.location.hash = '#dashboard';
}

function repaint() {
  const r = route();
  if (r.view === 'table') {
    $('app').innerHTML = renderBill(r.id);
  }
}

// ═══════════════════════════════════════════
//  QR CODE
// ═══════════════════════════════════════════
function showQR(tid) {
  const url = window.location.origin + window.location.pathname + '#table/' + tid;
  $('modal-title').textContent = 'Table ' + tid;
  $('modal-url').textContent   = url;

  const box = $('qr-box');
  box.innerHTML = '';

  if (typeof QRCode !== 'undefined') {
    new QRCode(box, {
      text: url, width: 200, height: 200,
      colorDark: '#111111', colorLight: '#FFFFFF',
      correctLevel: QRCode.CorrectLevel.M,
    });
  } else {
    box.innerHTML = `<div style="width:200px;height:200px;background:#F9FAFB;border:1px solid #E5E7EB;
      border-radius:6px;display:flex;align-items:center;justify-content:center;
      color:#6B7280;font-size:12px;text-align:center;padding:16px">
      QR library not loaded.<br>Check your connection.</div>`;
  }
  $('overlay').classList.remove('hidden');
}

function closeModal() {
  $('overlay').classList.add('hidden');
  $('qr-box').innerHTML = '';
}

function handleOverlayClick(e) {
  if (e.target === $('overlay')) closeModal();
}

// ═══════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════
window.addEventListener('hashchange', () => {
  S.option     = null;
  S.screen     = 'bill';
  S.payMethod  = null;
  S.pendingPay = null;
  render();
});

if (!window.location.hash || window.location.hash === '#') {
  window.location.hash = '#dashboard';
} else {
  render();
}
</script>
</body>
</html>
